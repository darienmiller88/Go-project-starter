services:
  api:
    build: .
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgres://appuser:secret@db:5432/appdb?sslmode=disable
      - PORT=8080
    depends_on:
      - db
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: